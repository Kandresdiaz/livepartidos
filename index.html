<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 FINAL EN VIVO | Minuto a Minuto & Pronósticos IA</title>
  
  <!-- Meta Tags para Facebook / WhatsApp (Open Graph) -->
  <meta property="og:title" content="🔴 EN VIVO: Marcador, Estadísticas y Pronósticos IA">
  <meta property="og:description" content="Sigue minuto a minuto la Gran Final en vivo con predicciones en tiempo real.">
  <meta property="og:type" content="website">

  <!-- Font Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #0b0f19;
      --card-bg: rgba(22, 30, 49, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-gold: #f59e0b;
      --accent-red: #ef4444;
      --accent-green: #10b981;
      --accent-purple: #8b5cf6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b 0%, var(--bg-main) 60%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .app-container {
      max-width: 720px;
      width: 100%;
    }

    /* Top Bar Header */
    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--accent-red);
      color: #fca5a5;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background-color: var(--accent-red);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-red);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; }
      100% { transform: scale(0.95); opacity: 1; }
    }

    h1.title {
      font-size: 26px;
      font-weight: 900;
      margin-top: 10px;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .disclaimer {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Target / Card Glassmorphism */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* AI Prediction Box */
    .ai-card {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.4);
      position: relative;
      overflow: hidden;
    }

    .ai-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c084fc;
      font-weight: 800;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ai-content {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 600;
      color: #f1f5f9;
    }

    /* Action CTA Button (Monetization) */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(90deg, #10b981 0%, #059669 100%);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      font-size: 18px;
      padding: 16px 20px;
      border-radius: 14px;
      margin-bottom: 18px;
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px -5px rgba(16, 185, 129, 0.6);
    }

    /* Scorebat / Embed Container */
    .embed-card {
      padding: 0;
      overflow: hidden;
    }

    .embed-card iframe {
      width: 100%;
      height: 580px;
      border: none;
      border-radius: 16px;
    }

    /* Share Bar */
    .share-bar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .share-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .share-btn.wa { background: rgba(37, 211, 102, 0.15); border-color: rgba(37, 211, 102, 0.3); color: #4ade80; }
    .share-btn.fb { background: rgba(24, 119, 242, 0.15); border-color: rgba(24, 119, 242, 0.3); color: #60a5fa; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <div class="live-pill">
        <div class="pulse-dot"></div>
        MINUTO A MINUTO EN VIVO
      </div>
      <h1 class="title">🏆 LA GRAN FINAL</h1>
      <p class="disclaimer">Cobertura interactiva de estadísticas & pronósticos en tiempo real</p>
    </header>

    <!-- PREDICCIÓN DE IA EN TIEMPO REAL -->
    <div class="glass-card ai-card">
      <div class="ai-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Pronóstico de IA en Vivo
      </div>
      <div class="ai-content" id="aiTip">
        🤖 Analizando datos del partido en tiempo real...
      </div>
    </div>

    <!-- BOTÓN DE MONETIZACIÓN (ADSTERRA / AFILIADOS) -->
    <a href="https://www.google.com" id="monetizeLink" target="_blank" class="cta-btn">
      🔥 VER PROBABILIDADES Y APUESTAS EN VIVO ⚽
    </a>

    <!-- MARCADOR & WIDGET AUTOMÁTICO EN VIVO -->
    <div class="glass-card embed-card">
      <iframe src="https://www.scorebat.com/embed/livescore/" 
              allowfullscreen 
              loading="lazy">
      </iframe>
    </div>

    <!-- BOTONES DE COMPARTIR EN REDES -->
    <div class="share-bar">
      <a href="https://api.whatsapp.com/send?text= Sigue la Final del Mundial en vivo aquí: " id="shareWA" target="_blank" class="share-btn wa">
        WhatsApp
      </a>
      <a href="https://www.facebook.com/sharer/sharer.php?u=" id="shareFB" target="_blank" class="share-btn fb">
        Facebook
      </a>
    </div>
  </div>

  <script>
    // Predicciones automáticas generadas por IA
    const aiTips = [
      "🤖 <b>IA Predictor:</b> ALTA PROBABILIDAD DE GOL (+0.5) en los próximos 15 minutos debido a la intensidad ofensiva.",
      "🤖 <b>IA Predictor:</b> El sistema detecta presión en área rival. Opción ideal: Mas de 3.5 tiros de esquina.",
      "🤖 <b>IA Predictor:</b> Índice de posesión inclinado al ataque. Cuotas en vivo muy favorables para apuesta rápida.",
      "🤖 <b>IA Predictor:</b> Tramo del partido de alta fricción. Se prevén tarjetas amarillas y jugadas a balón parado."
    ];

    function updatePrediction() {
      const tipElement = document.getElementById('aiTip');
      const randomTip = aiTips[Math.floor(Math.random() * aiTips.length)];
      tipElement.innerHTML = randomTip;
    }

    updatePrediction();
    setInterval(updatePrediction, 35000); // Cambia cada 35 segundos

    // Configurar URLs compartidas dinámicamente
    const currentUrl = encodeURIComponent(window.location.href);
    document.getElementById('shareWA').href += currentUrl;
    document.getElementById('shareFB').href += currentUrl;
  </script>

</body>
</html>
